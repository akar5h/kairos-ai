# config/context.yaml — coding agents only; lead pipeline ops moved to
# config/context.lead-pipeline.yaml.disabled (uninstrumented window; owner
# descoped from sprint; see audit F8 — all 21 lead-tool names had zero spans
# in the 168h observation window as of 2026-06-12).

agent_name: "Xero Platform"
agent_description: "Paperclip coding agents (ClaudeCoder, CTO) executing issues."

operations:

  - name: "Code Implementation"
    description: "Writing and editing source code to implement features or fix bugs"
    expected_tools: [Read, Edit, Write, Bash, Grep, Glob]
    required_side_effect_tools: [Edit, Write]
    # any: a real coding session typically uses Edit OR Write, rarely both.
    # Demanding both failed every Edit-only/Write-only trace (spot-check Day 4,
    # 7/7 owner-disputed N rows were exactly this).
    side_effect_match: any
    priority: high

  - name: "Codebase Research"
    description: "Read-only exploration — answering questions, mapping structure, finding symbols. Distinctive tool is Read. Edit and Write are excluded: calling either means the trace is implementation, not research."
    expected_tools: [Read, Grep, Glob, Bash]
    required_side_effect_tools: [Read]
    excluded_tools: [Edit, Write]
    priority: medium

  - name: "Multi-Agent Orchestration"
    description: "Spawning and coordinating subagents for parallel or delegated work"
    expected_tools: [Agent, Bash, Read]
    required_side_effect_tools: [Agent]
    priority: high

  - name: "Paperclip Coordination"
    description: "Checking out issues, posting comments, updating status via Skill (MCP) tool"
    expected_tools: [Bash, Skill]
    required_side_effect_tools: [Skill]
    priority: high
    # Bash dropped from required_side_effect_tools: base rate 0.83 makes it ubiquitous
    # across ALL workflows — not distinctive. Skill at 0.30 base rate (105 spans) IS
    # distinctive. If Skill spans ever drop to zero: traces fall to Code Implementation
    # or unmapped. HONEST > clever.
