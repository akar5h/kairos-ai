# OpenTelemetry Collector — Kairos default OTLP backend ingest layer (Apache-2.0).
# Agents emit OTLP here; the collector fans spans to the Apache-2.0 store (Jaeger).
# The backend is swappable behind this endpoint without touching the emit side.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Apache-2.0 trace store + raw-trace UI.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Phoenix (ELv2, opt-in profile) — HTTP OTLP protobuf at phoenix:6006/v1/traces.
  # Active when the phoenix service is in the compose stack.
  otlphttp/phoenix:
    endpoint: http://phoenix:6006
    encoding: proto
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, otlphttp/phoenix, debug]
  telemetry:
    logs:
      level: info
