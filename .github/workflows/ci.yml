name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create Python 3.13 venv
        run: uv venv --python 3.13

      - name: Install
        run: uv pip install -e ".[dev,phoenix]"

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        run: uv run mypy src/

      - name: Tests + coverage
        run: uv run pytest -x --tb=short --cov=kairos --cov-report=term-missing
